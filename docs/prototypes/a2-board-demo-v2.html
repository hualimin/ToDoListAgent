<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>子系统A2 · 看板+拖拽 v2</title>
<style>
  :root{
    --bg:#F5F1E8; --card:#FBF8F0; --ink:#2E3A2E; --ink2:#5E6B58; --ink3:#9AA28E;
    --line:#E2DAC4; --accent:#6B8E5A; --urgent:#C17A54; --high:#D4B063;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#E8E0CC;color:var(--ink);}
  .wrap{max-width:1180px;margin:0 auto;padding:24px;}
  h1{font-size:20px;margin:0 0 4px;}
  .lead{font-size:13px;color:var(--ink2);margin:0 0 18px;line-height:1.6;}
  .stage{position:relative;background:var(--bg);border:1px solid var(--line);border-radius:24px;
         box-shadow:0 20px 50px -20px rgba(0,0,0,.25);overflow:hidden;height:680px;display:flex;flex-direction:column;}
  /* 角落视图切换图标 */
  .viewswitch{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:5;background:var(--card);
              border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:0 4px 10px -4px rgba(0,0,0,.2);}
  .viewswitch button{width:34px;height:34px;border-radius:999px;border:0;background:transparent;cursor:pointer;
                     display:flex;align-items:center;justify-content:center;color:var(--ink2);}
  .viewswitch button.on{background:var(--accent);color:#fff;}
  .viewswitch svg{width:18px;height:18px;}
  .titlebar{padding:16px 18px 6px;}
  .titlebar h2{margin:0;font-size:16px;}
  .titlebar p{margin:2px 0 0;font-size:11px;color:var(--ink3);}
  .body{flex:1;overflow:auto;padding:8px 12px 14px;}
  /* 并排两板 */
  .side{display:flex;gap:12px;align-items:flex-start;}
  .panel{flex:1;min-width:0;}
  .panel h3{font-size:12px;color:var(--ink2);margin:6px 4px 8px;display:flex;justify-content:space-between;align-items:center;}
  .panel h3 .tag{font-size:10px;color:var(--ink3);background:var(--card);padding:2px 8px;border-radius:999px;border:1px solid var(--line);}
  .cols{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;}
  .col{min-width:150px;width:150px;background:color-mix(in srgb,var(--card) 65%,transparent);border:1px solid var(--line);
       border-radius:14px;padding:7px;display:flex;flex-direction:column;gap:7px;min-height:100px;}
  .col.dragover{outline:2px dashed var(--accent);outline-offset:-3px;}
  .col h4{margin:0 2px;font-size:11px;color:var(--ink2);display:flex;justify-content:space-between;}
  .col h4 .cnt{font-size:9px;color:var(--ink3);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 9px;cursor:grab;
        font-size:12px;box-shadow:0 2px 5px -3px rgba(0,0,0,.15);}
  .card:hover{box-shadow:0 3px 8px -3px rgba(0,0,0,.22);}
  .card.dragging{opacity:.4;}
  .card .t{font-weight:600;line-height:1.3;}
  .card .m{font-size:9px;color:var(--ink3);margin-top:4px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
  .pill{font-size:8px;padding:1px 5px;border-radius:999px;background:var(--bg);color:var(--ink2);}
  /* 列表模式 */
  .listmode{display:flex;flex-direction:column;gap:7px;}
  .listmode .card{display:flex;justify-content:space-between;align-items:center;}
  /* 读数 */
  .readout{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:14px;}
  .readout h5{margin:0 0 6px;font-size:12px;color:var(--ink2);}
  .kv{display:flex;gap:8px;font-size:13px;margin:3px 0;font-family:ui-monospace,monospace;}
  .kv b{color:var(--ink3);font-weight:500;min-width:84px;}
  .hint{font-size:12px;color:var(--ink3);line-height:1.7;margin-top:12px;}
  code{background:var(--card);padding:1px 5px;border-radius:5px;border:1px solid var(--line);font-size:11px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>子系统 A2 · 看板+拖拽 v2</h1>
  <p class="lead">右上角图标切显示样式：① 只状态板 ② 只时间板 ③ 两板并排（同屏可拖）④ 列表。时间板是<b>从今天往后的连续日期轴</b>（不限一周，可横滑）。跨列拖=改状态/日期，列内拖到某卡前=调顺序。</p>

  <div class="stage">
    <div class="viewswitch">
      <button class="on" data-v="status" title="状态板"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="10" rx="1"/><rect x="17" y="4" width="4" height="13" rx="1"/></svg></button>
      <button data-v="time" title="时间板"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg></button>
      <button data-v="both" title="两板并排"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="8" height="16" rx="1"/><rect x="13" y="4" width="8" height="16" rx="1"/></svg></button>
      <button data-v="list" title="列表"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
    </div>
    <div class="titlebar"><h2>待办</h2><p id="sub">状态板 · 拖到别的列改状态</p></div>
    <div class="body" id="body"></div>
  </div>

  <div class="readout"><h5>最近一次拖拽的数据变化</h5><div id="readout"><span style="color:var(--ink3);font-size:13px">拖一张卡 →</span></div></div>
  <p class="hint">真机用 dnd-kit（触摸）+ 套 4 主题；时间板连续日期默认显示今天起 10 天，可继续横滑更多；改 due_at 的带提醒任务 → 自动 <code>pending_up</code> 同步。</p>
</div>

<script>
const STATUSES=[{id:'todo',label:'待办'},{id:'doing',label:'进行中'},{id:'done',label:'完成'},{id:'shelved',label:'搁置'},{id:'delayed',label:'延期'}];
const N_DAYS=10;
function days(){
  const now=new Date(); const wd=['日','一','二','三','四','五','六'];
  return Array.from({length:N_DAYS},(_,i)=>{const d=new Date(now);d.setDate(now.getDate()+i);
    return{id:'d'+i,label:i===0?'今天':i===1?'明天':`${d.getMonth()+1}/${d.getDate()}`,sub:wd[d.getDay()],iso:d};});
}
const DAYS=days();
let tasks=[
  {id:1,title:'回复张工的邮件',status:'todo',date:1,urg:'urgent'},
  {id:2,title:'整理本周复盘',status:'doing',date:0,urg:'normal'},
  {id:3,title:'订生日蛋糕',status:'todo',date:2,urg:'high'},
  {id:4,title:'看完《深度工作》第3章',status:'done',date:-1,urg:'normal'}, // date-1 = 已完成区/过去
  {id:5,title:'预约牙医',status:'delayed',date:null,urg:'normal'},
  {id:6,title:'写周报',status:'todo',date:3,urg:'high'},
  {id:7,title:'调研 dnd-kit',status:'doing',date:0,urg:'normal'},
  {id:8,title:'整理云盘',status:'shelved',date:null,urg:'low'},
];
tasks.forEach((t,i)=>t.order=i);
let view='status'; let dragId=null;

const urgColor=u=>u==='urgent'?'var(--urgent)':u==='high'?'var(--high)':'var(--ink3)';
const urgLabel=u=>u==='urgent'?'紧急':u==='high'?'高':u==='low'?'低':'普通';

function render(){
  const body=document.getElementById('body');
  const sub=document.getElementById('sub');
  if(view==='list'){
    sub.textContent='列表 · 按顺序';
    body.innerHTML='<div class="listmode" id="lm"></div>';
    const lm=document.getElementById('lm');
    [...tasks].sort((a,b)=>a.order-b.order).forEach(t=>{
      const c=cardEl(t);
      const r=document.createElement('span');r.className='pill';r.textContent=STATUSES.find(s=>s.id===t.status).label;
      c.querySelector('.m').remove();c.appendChild(r);lm.appendChild(c);
    });
    bind();return;
  }
  if(view==='both') sub.textContent='两板并排 · 可分别拖';
  else if(view==='status') sub.textContent='状态板 · 拖到别的列改状态';
  else sub.textContent='时间板 · 拖到别的天改日期（今天起往后）';

  const wrap=document.createElement('div');wrap.className=view==='both'?'side':'';
  if(view==='both'||view==='status') wrap.appendChild(boardEl('status'));
  if(view==='both'||view==='time') wrap.appendChild(boardEl('time'));
  body.innerHTML='';body.appendChild(wrap);bind();
}

function boardEl(kind){
  const panel=document.createElement('div');panel.className='panel';
  const h=document.createElement('h3');
  h.innerHTML=kind==='status'?'状态板 <span class="tag">按状态</span>':'时间板 <span class="tag">连续日期</span>';
  panel.appendChild(h);
  const cols=document.createElement('div');cols.className='cols';
  const columns = kind==='status'
    ? STATUSES.map(s=>({id:s.id,label:s.label,sub:'',match:t=>t.status===s.id}))
    : [...DAYS.map(d=>({id:'d'+d.id.slice(1),label:d.label,sub:d.sub,match:t=>t.date===+(d.id.slice(1))})),
        {id:'none',label:'未排期',sub:'',match:t=>t.date==null||t.date<0}];
  columns.forEach(col=>{
    const items=tasks.filter(col.match).sort((a,b)=>a.order-b.order);
    const div=document.createElement('div');div.className='col';div.dataset.col=col.id;div.dataset.kind=kind;
    div.innerHTML=`<h4>${col.label}${col.sub?` <span style="font-weight:400;color:var(--ink3)">${col.sub}</span>`:''} <span class="cnt">${items.length}</span></h4>`;
    items.forEach(t=>div.appendChild(cardEl(t,col)));
    cols.appendChild(div);
  });
  panel.appendChild(cols);return panel;
}

function cardEl(t,col){
  const c=document.createElement('div');c.className='card';c.draggable=true;c.dataset.id=t.id;
  const di = typeof t.date==='number' && t.date>=0 ? DAYS[t.date] : null;
  c.innerHTML=`<div class="t">${t.title}</div>
    <div class="m"><span class="dot" style="background:${urgColor(t.urg)}"></span>${urgLabel(t.urg)}
      ${di?` · <span>${di.label}</span>`:' · 无日期'}</div>`;
  return c;
}

function bind(){
  document.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('dragstart',e=>{dragId=+c.dataset.id;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    c.addEventListener('dragend',()=>{c.classList.remove('dragging');document.querySelectorAll('.col').forEach(x=>x.classList.remove('dragover'));});
  });
  document.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('dragover');});
    col.addEventListener('dragleave',()=>col.classList.remove('dragover'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('dragover');if(dragId==null)return;
      const t=tasks.find(x=>x.id===dragId);if(!t)return;
      const kind=col.dataset.kind;
      const before=[...col.querySelectorAll('.card')].find(c=>{const r=c.getBoundingClientRect();return e.clientY<r.top+r.height/2;});
      if(kind==='status'){const s=STATUSES.find(x=>x.id===col.dataset.col);if(t.status!==s.id)t.status=s.id;}
      else{const v=col.dataset.col;t.date = v==='none'?null:+v;}
      // 列内重排（演示；真效用中点）
      const key=x=>kind==='status'?x.status:(x.date??'none');
      const same=tasks.filter(x=>key(x)===key(t)).sort((a,b)=>a.order-b.order);
      same.splice(same.findIndex(x=>x.id===t.id),1);
      if(before){const bi=same.findIndex(x=>x.id===+before.dataset.id);same.splice(bi,0,t);}
      same.forEach((x,i)=>x.order=i);
      showReadout(t);render();
    });
  });
}

function showReadout(t){
  const di=typeof t.date==='number'&&t.date>=0?DAYS[t.date]:null;
  document.getElementById('readout').innerHTML=`
    <div class="kv"><b>title</b><span>${t.title}</span></div>
    <div class="kv"><b>status</b><span>${STATUSES.find(s=>s.id===t.status).label}（${t.status}）</span></div>
    <div class="kv"><b>due_at</b><span>${di?di.label+' '+di.sub:'未排期'}</span></div>
    <div class="kv"><b>board_order</b><span>${t.order}</span></div>
    <div class="kv"><b>sync_state</b><span>${t.date!=null&&t.date>=0?'→ pending_up（触发同步）':'clean'}</span></div>`;
}

document.querySelectorAll('.viewswitch button').forEach(b=>{
  b.addEventListener('click',()=>{document.querySelectorAll('.viewswitch button').forEach(x=>x.classList.remove('on'));b.classList.add('on');view=b.dataset.v;render();});
});
render();
</script>
</body>
</html>
